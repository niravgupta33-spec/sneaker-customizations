<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | KICKCRAFT</title>
    <meta name="description" content="View your KickCraft order history and track your custom sneaker orders.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-bg"></div>

    <nav class="navbar">
        <div class="logo">KICK<span>CRAFT</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#features">Features</a></li>
            <li><a href="customize.html">Customizer</a></li>
            <li><a href="orders.html" class="active" style="display: flex; align-items: center; gap: 6px;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block;"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><polygon points="12 22.08 12 12 3 6.92 3 17 12 22.08"></polygon><polygon points="12 22.08 12 12 21 6.92 21 17 12 22.08"></polygon><polygon points="12 12 3 6.92 12 1.84 21 6.92 12 12"></polygon></svg> Orders</a></li>
        </ul>
        <div class="navbar-right">
            <a href="index.html" class="btn-secondary">Back</a>
            <button class="cart-icon-btn" id="cartOpenBtn" aria-label="Shopping Cart">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-shopping-cart"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
            </button>
        </div>
    </nav>

    <main class="orders-page-container">
        <div class="orders-page-header">
            <h1>Order <span class="gradient-text">History</span></h1>
            <p>Track all your KickCraft purchases and custom creations.</p>
        </div>

        <div class="orders-header-actions">
            <button class="btn-clear-orders" id="clearOrdersBtn" style="display: inline-flex; align-items: center; gap: 6px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg> Clear History</button>
        </div>

        <div class="orders-list" id="ordersContainer">
            <!-- Orders rendered by JS -->
        </div>
    </main>

    <!-- Cart Overlay & Sidebar -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="cart-close" id="cartCloseBtn">✕</button>
        </div>
        <div class="cart-items" id="cartItemsContainer">
            <div class="cart-empty">Your cart is empty.</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">₹0</span>
            </div>
            <button class="btn-primary btn-checkout" style="width: 100%;">Checkout</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
